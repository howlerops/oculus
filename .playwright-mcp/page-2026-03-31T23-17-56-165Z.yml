              - generic [ref=e633]: Subagents each run in their own isolated context and communicate only via message passing. Threads share context explicitly. The orchestrator passes context into each thread, episodes return back, and one thread's episode can become another thread's input.
            - heading "Solving Episodic Memory with Threads" [level=3] [ref=e634]:
              - link [ref=e635] [cursor=pointer]:
                - /url: "#section-15"
                - text: "#"
              - text: Solving Episodic Memory with Threads
            - paragraph [ref=e636]:
              - text: The steps a thread takes while completing an action constitute an
              - emphasis [ref=e637]: episode
              - text: . This gives us a tractable form of true episodic memory in LLMs.
            - paragraph [ref=e638]: "Episodic memory is the compressed representation of a completed episode: only the important results are retained, not the full tactical trace of every step taken to reach them. Subthreads do not do back-and-forth message passing with the main thread. Instead, they execute, and the episode is returned. This built-in completion boundary is what makes compaction natural in Slate's architecture."
            - paragraph [ref=e639]: Episodes can also be used as direct inputs to other threads. This makes threads composable. A thread can be initialized with the episode of a prior thread inheriting the useful conclusions and work history without inheriting the full context. This composability is what makes a thread-based architecture maximally expressive as a primitive, and what distinguishes it from naive subagent designs that only pass back a single response string.
            - heading "Thread Weaving" [level=3] [ref=e640]:
              - link [ref=e641] [cursor=pointer]:
                - /url: "#section-16"
                - text: "#"
              - text: Thread Weaving
            - paragraph [ref=e642]:
              - text: The result of thread-based execution is a system that decomposes tasks implicitly and adaptively — without ever requiring a static plan. The orchestrator is not forced to commit upfront, but
              - emphasis [ref=e643]: is
              - text: "forced to externalize work in bounded, compressible units. This is thread weaving: the orchestrator dispatches, threads execute, episodes compose."
            - paragraph [ref=e644]:
              - text: "The mechanism: the orchestrator uses threads"
              - emphasis [ref=e645]: by reference
              - text: ", giving it semantics for complex context routing — similar to what RLM achieves through its REPL, but without the rigidity since actions execute inside a thread one step at a time. Because thread scope is bounded, the system naturally synchronizes with the current plan. Because threads are LLM-driven rather than static scripts, they can react to unexpected environment state instead of crashing."
            - paragraph [ref=e646]:
              - text: The result is a system that decomposes tasks implicitly and adaptively. The orchestrator manages planning and decomposition as it goes. It's not forced to commit to a static plan upfront. But it
              - emphasis [ref=e647]: is
              - text: forced to externalize that decomposition in useful units of work that can be compressed and referenced later. Frequent synchronization means the orchestrator can also update its strategy when new information arrives mid-task.
            - 'figure "Thread weaving: bounded worker episodes dispatched from and synchronized back into one orchestration thread. Threads T1/T2/T3 run independently; their episodes become inputs to subsequent work." [ref=e648]':
              - paragraph [ref=e649]: "Slate: Thread Weaving & Episode Architecture"
