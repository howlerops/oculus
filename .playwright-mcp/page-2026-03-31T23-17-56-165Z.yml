                - generic [ref=e463]: ↑ context lost here
              - img "Manus context reduction diagram from Lance Martin's 'Context Engineering in Manus' — showing the full and compact representations of tool results and how stale results are pruned from context." [ref=e464]
              - generic [ref=e465]:
                - text: "The Devin/Manus/Altera pattern: a high-level strategic agent delegates to a lower-level executor, compresses results, and synchronizes back. Every compress boundary risks dropping critical state. Via Lance Martin — Context Engineering in Manus."
