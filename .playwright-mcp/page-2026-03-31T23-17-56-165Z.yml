              - generic [ref=e425]: Without intermediate feedback, the model must commit to a full sequence of steps — like navigating a maze blind. It only discovers it hit a wall when execution ends. With per-step feedback, it detects the wall immediately and reroutes.
            - paragraph [ref=e426]:
              - text: This is what we can describe as a lack of synchronization between the levels of the stack. The ability of the model to offload operations to some system (llm or program) that processes the information
              - emphasis [ref=e427]: in isolation
              - text: and returns only the finalized data constrains the main model's ability to adapt to failures encountered while executing its plan (the program in the repl). This is totally fine for reading information from an environment that isn't changing. However, when implementing, this rigidity from the lack of synchronization is problematic at best.
            - blockquote [ref=e428]: "A brief aside... The above observations, combined with an understanding of deep research agents, should expose a very specific context engineering pattern: stack based isolation works very well for research due to its ability to decompose retrieval tasks into isolated operations on immutable data which can then be synthesized."
            - paragraph [ref=e429]:
              - text: Overdecomposition and rigidity are failure modes that ReAct based agents don’t suffer from because the planning and execution happen implicitly, one turn at a time, allowing the model to be flexible and reactive.
              - superscript [ref=e430]:
                - link "[21]" [ref=e431] [cursor=pointer]:
                  - /url: "#ref-21"
            - paragraph [ref=e432]: Now, at this point everyone who is attempting to build an agent has thought “Hey what if I made a planner agent and then an implementer agent and then a review agent”.
            - paragraph [ref=e433]:
              - text: Let me spare you the trouble. It will sort of work, but you’re going to hate its guts while using it. It’s slow, clunky, and has a ton of inertia while working. This is largely a consequence of having a very strict pattern for execution rather than allowing the model to intelligently decide how it should handle the task. This will likely improve benchmark scores, but won’t actually improve your dev experience. Maintaining general expressivity during execution is
              - emphasis [ref=e434]: incredibly
              - text: important.
            - paragraph [ref=e435]:
              - text: "There are a few agent architectures that operate on this principle: Devin, Manus, Claude Code, and Altera’s project Sid (now"
              - link "shortcut" [ref=e436] [cursor=pointer]:
                - /url: https://shortcut.ai/
              - text: ).
            - heading "Devin, Manus, and Altera" [level=3] [ref=e437]:
              - link [ref=e438] [cursor=pointer]:
                - /url: "#section-11"
                - text: "#"
              - text: Devin, Manus, and Altera
            - paragraph [ref=e439]:
              - text: Devin, Manus, and Altera's PIANO architecture all fall into a bucket of "plan at a higher level and execute at a lower level" with some way to synchronize system 1 and system 2 thinking to get a long-running agent with persistent state.
              - superscript [ref=e440]:
                - link "[7]" [ref=e441] [cursor=pointer]:
                  - /url: "#ref-7"
              - superscript [ref=e442]:
                - link "[8]" [ref=e443] [cursor=pointer]:
                  - /url: "#ref-8"
              - superscript [ref=e444]:
                - link "[9]" [ref=e445] [cursor=pointer]:
                  - /url: "#ref-9"
              - superscript [ref=e446]:
                - link "[10]" [ref=e447] [cursor=pointer]:
                  - /url: "#ref-10"
            - paragraph [ref=e448]: They all follow a pattern of strategize with a high level planning agent, delegate to a lower level subagent, reduce the lower level agent context to some compressed representation, and return that formatted context to the higher level agent in order to synchronize the two. Altera's approach additionally allows the agents to do multiple forms of processing simultaneously.
            - paragraph [ref=e449]: This form of planning is prone to the same type of failure as mentioned above in the task decomposition section or the RLM section where overly strict execution constraints reduce the ability of the system to react to new information and necessarily force the subagent to fail in the same way running a script can fail.
            - paragraph [ref=e450]: "Synchronous subagents (where the main agent blocks and waits for a subagent result) are more reliable but slow. While asynchronous subagents introduce an additional problem: knowing when and how to reconcile results."
            - 'figure "The Devin/Manus/Altera pattern: a high-level strategic agent delegates to a lower-level executor, compresses results, and synchronizes back. Every compress boundary risks dropping critical state. Via Lance Martin — Context Engineering in Manus. [10]" [ref=e451]':
