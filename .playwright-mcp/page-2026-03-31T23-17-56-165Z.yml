              - generic [ref=e570]: Agent architecture comparison across key system properties. Slate has both the expressivity and reactivity of ReAct alongside the context isolation, parallelism, and compaction that other systems have.
            - 'heading "Slate''s Approach: Thread Weaving and Episodes" [level=2] [ref=e571]':
              - link [ref=e572] [cursor=pointer]:
                - /url: "#section-13"
                - text: "#"
              - text: "Slate's Approach: Thread Weaving and Episodes"
            - paragraph [ref=e573]: "To summarize what we have covered:"
            - list [ref=e574]:
              - listitem [ref=e575]: "Compaction: how to compress an agent trajectory while retaining key information"
              - listitem [ref=e576]: "Strategic coherence: how to allow an agent to strategize about a problem and stay aligned with that strategy throughout the course of the problem"
              - listitem [ref=e577]: "Expressivity: designing interfaces that allow the agent to express more complex behaviors"
              - listitem [ref=e578]: "Task decomposition: how to break down tasks and solve subproblems while maintaining flexibility at the top most level"
              - listitem [ref=e579]: "Synchronization: how to synchronize work being done throughout the system where the execution contexts are isolated"
            - paragraph [ref=e580]:
              - text: "In this section, we propose one architectural primitive for solving these problems: the"
              - emphasis [ref=e581]: thread
              - text: . The key insight is that frequent, bounded synchronization between an orchestrator thread and worker threads gives an actually usable balance of speed, latency, and intelligence.
            - heading "Threads" [level=3] [ref=e582]:
              - link [ref=e583] [cursor=pointer]:
                - /url: "#section-14"
                - text: "#"
              - text: Threads
            - paragraph [ref=e584]: "The idea is simple: use a highly expressive interface to access the knowledge overhang in a model, allowing it to strategize about its actions without focusing on implementation tactics. One central orchestration agent delegates actions to worker threads using a highly expressive interface (this can be a tool, a CLI, etc. We chose a DSL due to the flexibility that having access to a programming model gives us). A worker thread executes the action and returns to the main orchestrator."
            - paragraph [ref=e585]: Sound like a subagent? Not quite.
            - paragraph [ref=e586]:
              - text: "Threads are very specifc. Each thread executes one action and when that action is done, it pauses and hands control back to the main thread. You can think of an action like a tactic: Run a command sequence, extract X from file Y, etc. Unlike purpose-specific subagents, threads are general workers that serve the system's current intent. The orchestrator decides what to do next and the thread does it. Normal subagents are persistent, sometimes launched in the background, and synchronize with the main thread (or with eachother) through message passing due to their context isolation. Threads in contrast are only meant to accumulate context acting as a persistent reusable store for that specific work stream, and they don't use message passing as the primary way of communicating with the orchestrator. Instead, every thread action generates a compressed representation of its step history for executing"
              - emphasis [ref=e587]: just
              - text: that action sequence. This compressed representation is called an
              - emphasis [ref=e588]: episode
              - text: and is directly shared with the main thread.
            - figure "Subagents each run in their own isolated context and communicate only via message passing. Threads share context explicitly. The orchestrator passes context into each thread, episodes return back, and one thread's episode can become another thread's input." [ref=e589]:
              - paragraph [ref=e590]: "Threads vs. Subagents: Context Isolation"
              - 'img "Comparison diagram: subagents each have isolated context bubbles and communicate only via messages; threads explicitly share context — the orchestrator passes context in, episodes come back out" [ref=e591]':
