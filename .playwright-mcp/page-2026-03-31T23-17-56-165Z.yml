            - 'heading "Slate: moving beyond ReAct and RLM" [level=1] [ref=e38]'
            - generic [ref=e39]:
              - time [ref=e40]: 2026-03-09
              - generic [ref=e41]: ·
              - generic [ref=e42]: Random Labs Team
              - generic [ref=e43]: ·
              - generic [ref=e44]:
                - generic [ref=e45]: research
                - generic [ref=e46]: architecture
          - generic [ref=e47]:
            - heading "Introduction" [level=2] [ref=e48]:
              - link [ref=e49] [cursor=pointer]:
                - /url: "#section-0"
                - text: "#"
              - text: Introduction
            - paragraph [ref=e50]: In this technical report, we introduce a new agent architecture pattern, and demonstrate how single-threaded agents can generalize beyond ReAct and RLM.
            - paragraph [ref=e51]: Our goal at Random Labs is to build generalized, non-benchmaxxed, end-to-end agents for software engineering. The contents of this report bring us one step closer to this goal.
            - paragraph [ref=e52]: "We begin by examining a series of problems faced by modern LLM based agents: long horizon tasks, strategy vs tactics, and working context management. We explore existing solutions to these problems and their limitations. After enumerating the problems faced by modern agents, we describe Slate's architecture: a thread-based episodic memory system that solves all of them simultaneously."
            - heading "Background" [level=2] [ref=e53]:
              - link [ref=e54] [cursor=pointer]:
                - /url: "#section-1"
                - text: "#"
              - text: Background
            - paragraph [ref=e55]: "Building agents that generalize requires solving three compounding problems: long-horizon task execution, the balance between strategic and tactical reasoning, and working memory management. Each of these is tractable in isolation — the difficulty is that they interact."
            - heading "Understanding long horizon tasks" [level=3] [ref=e56]:
              - link [ref=e57] [cursor=pointer]:
                - /url: "#section-2"
                - text: "#"
              - text: Understanding long horizon tasks
            - paragraph [ref=e58]:
              - text: Long-horizon tasks are path-dependent (tasks where the required actions depend on each other), and the minimum number of steps to succeed exceeds what a minimal harness can do. A minimal harness is defined here as a limited tool-calling loop around a model with no additional planning or memory infrastructure. Terminus and Simple Codex both fall into this category while most agents you actually use to get work done do not.
              - superscript [ref=e59]:
                - link "[4]" [ref=e60] [cursor=pointer]:
                  - /url: "#ref-4"
              - superscript [ref=e61]:
                - link "[5]" [ref=e62] [cursor=pointer]:
                  - /url: "#ref-5"
            - paragraph [ref=e63]: "In order to solve this type of task, the agent requires three things: adequate working memory so the model can attend to the right context at the right time, a balance of strategic and tactical execution so the model both plans well and executes correctly, and the ability to integrate new information discovered throughout the task without losing track of the overall goal."
            - heading "Working memory" [level=3] [ref=e64]:
              - link [ref=e65] [cursor=pointer]:
                - /url: "#section-3"
                - text: "#"
              - text: Working memory
            - paragraph [ref=e66]:
              - text: Models cannot attend uniformly across their context window. The model's ability to attend to the information degrades as the context length grows. The usable portion, up to but not including the degraded region, is working memory. Dex Horthy coined the term "Dumb Zone" for the part of the context window where retrieval quality drops.
              - superscript [ref=e67]:
                - link "[6]" [ref=e68] [cursor=pointer]:
                  - /url: "#ref-6"
              - text: Working memory is effectively the context window up to that point.
              - superscript [ref=e69]:
                - link "[25]" [ref=e70] [cursor=pointer]:
                  - /url: "#ref-25"
            - figure "Context windows are not uniformly usable. The right edge — the Dumb Zone — degrades in attention quality as the window fills up." [ref=e71]:
              - paragraph [ref=e72]: Context Window & Dumb Zone
              - img "Context window and Dumb Zone diagram" [ref=e73]:
                - generic [ref=e78]: Working Memory
                - generic [ref=e79]: Dumb Zone
                - generic [ref=e80]: attention degrades
                - generic [ref=e82]: Context Window
              - generic [ref=e83]: Context windows are not uniformly usable. The right edge — the Dumb Zone — degrades in attention quality as the window fills up.
            - figure "All four frontier models degrade non-uniformly as input length grows, even on simple tasks. Via Hong, Troynikov & Huber — Context Rot (Chroma, 2025)." [ref=e84]:
              - paragraph [ref=e85]:
                - text: Performance Degradation vs. Input Length
                - superscript [ref=e86]:
                  - link "[24]" [ref=e87] [cursor=pointer]:
                    - /url: "#ref-24"
              - 'img "Context Rot: model performance vs input length across Claude Sonnet 4, GPT-4.1, Qwen3-32B, and Gemini 2.5 Flash — performance degrades non-uniformly as context grows."'
              - generic [ref=e88]: All four frontier models degrade non-uniformly as input length grows, even on simple tasks. Via Hong, Troynikov & Huber — Context Rot (Chroma, 2025).
            - heading "Strategy and Tactics" [level=3] [ref=e89]:
              - link [ref=e90] [cursor=pointer]:
                - /url: "#section-4"
                - text: "#"
              - text: Strategy and Tactics
            - paragraph [ref=e91]:
              - text: Strategy is open-ended planning based on knowledge that guides the system towards the goal, and tactics are learned, local action sequences which help materially take steps towards the goal. It's serendipitous that this distinction maps directly onto how RL has historically solved games like go and chess. In chess, traditional engines like Stockfish brute force through a move tree (a sort of tactic based search algorithm)
              - superscript [ref=e92]:
                - link "[16]" [ref=e93] [cursor=pointer]:
                  - /url: "#ref-16"
              - text: . In contrast, self-play RL has yielded systems that learn which positions matter strategically.
            - blockquote [ref=e94]:
              - paragraph [ref=e95]:
                - text: "\"In several games AlphaZero sacrificed pieces for long-term strategic advantage, suggesting that it has a more fluid, context-dependent positional evaluation than the rule-based evaluations used by previous chess programs.\""
                - superscript [ref=e96]:
                  - link "[11]" [ref=e97] [cursor=pointer]:
                    - /url: "#ref-11"
            - figure "Brute force evaluates every node at every depth. Value/policy guided search uses the value network to judge positions strategically and the policy network to select moves tactically — exploring far fewer nodes to reach stronger play." [ref=e98]:
              - paragraph [ref=e99]: Brute Force vs. Value / Policy Execution
              - img "Brute force tree search vs value and policy guided execution" [ref=e100]:
                - generic [ref=e102]: Brute Force
                - generic [ref=e103]: exhaustive tree search (Stockfish)
                - generic [ref=e127]: every node evaluated at every depth
                - generic [ref=e129]: Value / Policy
                - generic [ref=e130]: guided search (AlphaZero)
                - generic [ref=e149]: "policy: move selection (tactics)"
                - generic [ref=e150]: "value: pruned (strategy)"
              - generic [ref=e151]: Brute force evaluates every node at every depth. Value/policy guided search uses the value network to judge positions strategically and the policy network to select moves tactically — exploring far fewer nodes to reach stronger play.
            - paragraph [ref=e152]:
              - text: "Go makes the separation even more explicit: strategy covers influence, territory balance, and whole-board thinking, while tactics cover reading (calculating specific local sequences) and life-and-death problems. When DeepMind built AlphaGo, this split was literally architected in: the value network handles positional judgment (strategy) while the policy network handles move selection (tactics)."
              - superscript [ref=e153]:
                - link "[14]" [ref=e154] [cursor=pointer]:
                  - /url: "#ref-14"
              - text: Research probing AlphaZero's internal representations during training found that tactical concepts — material value — are learned first, followed by strategic concepts like king safety and mobility. They emerge separately, at different training stages, in different layers of the network.
              - superscript [ref=e155]:
                - link "[12]" [ref=e156] [cursor=pointer]:
                  - /url: "#ref-12"
            - figure [ref=e157]:
              - paragraph [ref=e158]: "AlphaZero: Concept Emergence by Training Stage"
              - img "AlphaZero concept emergence timeline by training stage" [ref=e159]:
                - generic [ref=e161]: training steps
                - generic [ref=e162]: "0"
                - generic [ref=e163]: 16k–32k
                - generic [ref=e164]: 32k–64k
                - generic [ref=e165]: 128k+
                - generic [ref=e167]: material value & space
                - generic [ref=e169]: king safety, threats, mobility
                - generic [ref=e171]: sophisticated trade-offs
                - generic [ref=e172]: tactical
                - generic [ref=e173]: strategic (positional)
                - generic [ref=e174]: strategic (long-horizon)
                - generic [ref=e175]: concepts become linearly decodable from network activations around layer d=10 of 20, then plateau
            - blockquote [ref=e176]:
              - paragraph [ref=e177]:
                - text: "\"...piece value is a keystone concept, developed first. Subsequently, issues around mobility (king safety, attack, and defense) arise. Finally, there is a refinement stage, in which the network learns to make sophisticated trade-offs..\""
                - superscript [ref=e178]:
                  - link "[12]" [ref=e179] [cursor=pointer]:
                    - /url: "#ref-12"
            - figure "Concept emergence in AlphaZero during self-play training. Tactical concepts (material, space) are learned within the first 32k steps. Strategic positional concepts (king safety, threats, mobility) emerge at 32k+. Long-horizon trade-off reasoning develops last. McGrath et al., PNAS 2022." [ref=e180]:
              - 'img "Figure 5 from McGrath et al. (PNAS 2022): Value regression from human-defined concepts over time. (A) Piece value weights converge toward standard values. (B) Material predicts value early in training; mobility and king safety emerge later." [ref=e181]'
              - generic [ref=e182]: Concept emergence in AlphaZero during self-play training. Tactical concepts (material, space) are learned within the first 32k steps. Strategic positional concepts (king safety, threats, mobility) emerge at 32k+. Long-horizon trade-off reasoning develops last. McGrath et al., PNAS 2022.
            - paragraph [ref=e183]: The paper's qualitative evaluation by former world champion Vladimir Kramnik confirms the order directly. At 16k steps AlphaZero loses on material; by 32k it has a solid grasp of piece value. The 32k-to-64k leap is dominated by king safety in imbalanced positions. Beyond 128k the gains are in knowing which attacks will succeed — accepting material sacrifices and converting them — rather than in positional or endgame play. Tactical knowledge first, strategic judgment second.
            - heading "Software Engineering as an open-ended long horizon game" [level=4] [ref=e184]
            - paragraph [ref=e185]: We see software engineering as a more open ended and infinite game where both strategy and tactics are relevant depending on the task they are applied to. For example, remembering and executing a bash command is a simple tactic. Designing a schema so that it is backwards compatible as it changes is more strategic.
            - figure "Software engineering tasks span a spectrum. Tactics are immediate and executable; strategy requires reasoning about future states and tradeoffs." [ref=e186]:
              - paragraph [ref=e187]: Strategy vs. Tactics Spectrum
              - img "Strategy vs tactics spectrum in software engineering" [ref=e188]:
                - generic [ref=e191]: Tactical
                - generic [ref=e192]: Strategic
                - generic [ref=e194]: run a bash cmd
                - generic [ref=e196]: write a test suite
                - generic [ref=e198]: plan a refactor
                - generic [ref=e200]: design a schema
              - generic [ref=e201]: Software engineering tasks span a spectrum. Tactics are immediate and executable; strategy requires reasoning about future states and tradeoffs.
            - paragraph [ref=e202]: This can be seen in the fact that if a model is asked to write a plan or think through a task step by step, it's actually first being given a knowledge retrieval task, and then an agentic execution task. The initial planning/thinking can be viewed as the model retrieving knowledge and strategizing about a path to the solution, and then using tactics to execute the plan.
            - blockquote [ref=e203]:
              - paragraph [ref=e204]: A brief aside -- most rules in AGENTS.md files are actually tactical ex. "Never run db commands".
            - heading "Prior Approaches" [level=2] [ref=e205]:
              - link [ref=e206] [cursor=pointer]:
                - /url: "#section-5"
                - text: "#"
              - text: Prior Approaches
            - paragraph [ref=e207]: No existing approach solves all of the above problems simultaneously. Each approach accepts a tradeoff of solving one or two at the expense of the others.
            - heading "Solving working memory and defeating the Dumb Zone" [level=3] [ref=e208]:
              - link [ref=e209] [cursor=pointer]:
                - /url: "#section-6"
                - text: "#"
              - text: Solving working memory and defeating the Dumb Zone
            - paragraph [ref=e210]:
              - text: The first solution that comes to mind is to compress the context for the model! Surely we can reliably drop irrelevant context periodically and solve our problem. This strategy is known as
              - emphasis [ref=e211]: compaction
              - text: .
            - heading "Compaction" [level=4] [ref=e212]
            - paragraph [ref=e213]: Compaction is one naive solution to working memory in isolation.
            - paragraph [ref=e214]: Compaction is largely unsolved. Most “compaction” is actually lossy compression (despite having gotten better).
            - blockquote [ref=e215]:
              - paragraph [ref=e216]:
                - text: "In early 2025 (around may) we built (one of) the first instance(s) of a sliding window based agent that could run for incredibly long session lengths (up to 2 days reported by our users). This agent is deprecated, but is available as an npm package:"
                - code [ref=e217]: npm i -g @randomlabs/slatecli
            - paragraph [ref=e218]: "There are a few instances of working but lossy compression in the wild:"
            - list [ref=e219]:
              - listitem [ref=e220]: Compaction in claude code (notoriously bad)
              - listitem [ref=e221]:
                - text: The now infamous Ralph Wiggum loop by Geoffrey Huntley
                - superscript [ref=e222]:
                  - link "[17]" [ref=e223] [cursor=pointer]:
                    - /url: "#ref-17"
              - listitem [ref=e224]:
                - text: Amp handoffs (a crowd favorite, but requiring guidance from the user)
                - superscript [ref=e225]:
                  - link "[18]" [ref=e226] [cursor=pointer]:
                    - /url: "#ref-18"
            - paragraph [ref=e227]: Amp probably has the most interesting implementation here since a handoff is designed to bootstrap a new fresh agent session.
            - paragraph [ref=e228]: The main issue with compaction is that it is not deterministically lossy, which means we can unpredictably lose important information.
            - heading "Subagents" [level=4] [ref=e229]
            - paragraph [ref=e230]: To avoid the lossiness of compaction, we can instead try to isolate the unimportant context. This is where subagents come in.
            - paragraph [ref=e231]: Subagents are a second naive solution to working memory in isolation. Subagents work relatively well. They isolate context. This isolation means that the naive implementation fails to transfer information across context boundaries since all it returns is a response message (see codex/claude-code subagents).
            - heading "Markdown Planning" [level=3] [ref=e232]:
              - link [ref=e233] [cursor=pointer]:
                - /url: "#section-7"
                - text: "#"
              - text: Markdown Planning
            - paragraph [ref=e234]: To make sure we maintain coherence across different parts of a task, compactions, and isolated subagent contexts, we can plan upfront.
            - paragraph [ref=e235]:
              - text: Markdown plans are also one method of balancing strategy and tactics. By asking a model to plan the task out, it forces the model to use its
              - emphasis [ref=e236]: knowledge
              - text: to strategize about the task, which broadly provides a much much better outcome than directly exploiting its own learned behaviors. Giving the model the tactic to track the task progress in the doc allows the model to repeatedly refresh its understanding of its
              - emphasis [ref=e237]: strategy
              - text: throughout the task and stay aligned.
            - paragraph [ref=e238]: As models improve and are trained on this style of strategizing through markdown plans, the tasks the model can complete with just a simple markdown file will necessarily increase in scope. However, there will likely always be a difference between planning v.s. directly exploiting the learned behaviors.
            - blockquote [ref=e239]:
              - paragraph [ref=e240]:
                - text: We can describe this as knowledge overhang. The knowledge that a given model has access to theoretically, but can't access tactically without a trick like "think step by step" or by planning in files.
                - superscript [ref=e241]:
                  - link "[22]" [ref=e242] [cursor=pointer]:
                    - /url: "#ref-22"
            - figure "Knowledge overhang as a rollout sampling problem. The model's latent knowledge covers a wide range of trajectories through the task space, but direct tactical sampling only accesses a narrow band. Planning, chain-of-thought, and scaffolding expand the sampled region." [ref=e243]:
              - paragraph [ref=e244]: Knowledge Overhang as Rollout Sampling
              - img "Knowledge overhang as a 3D manifold surface" [ref=e245]:
                - generic [ref=e288]: start
                - generic [ref=e289]: Tactically Accessible
                - generic [ref=e290]: Knowledge
                - generic [ref=e291]: Overhang
                - generic [ref=e292]: Knowledge
                - generic [ref=e293]: Overhang
                - generic [ref=e294]: Edge of Model Knowledge
                - generic [ref=e295]: Edge of Model Knowledge
                - generic [ref=e296]: Tactically Accessible
              - generic [ref=e297]: Knowledge overhang as a rollout sampling problem. The model's latent knowledge covers a wide range of trajectories through the task space, but direct tactical sampling only accesses a narrow band. Planning, chain-of-thought, and scaffolding expand the sampled region.
            - paragraph [ref=e298]: Necessarily, there is a limit to how far this form of planning can go. The limit simply increases as the models get better.
            - paragraph [ref=e299]:
              - strong [ref=e300]: "Three key failure modes:"
            - list [ref=e301]:
              - listitem [ref=e302]: The model isn’t thorough enough when writing the plan (doesn't specify the plan enough)
              - listitem [ref=e303]: The model isn’t thorough enough while executing the plan (the model loses the plot and misses pieces of the plan)
              - listitem [ref=e304]: The model forgets it has free will and it’s learned tactics don’t allow it to adapt to new information (it forgets to update the plan in the right direction)
            - paragraph [ref=e305]: We’ve probably all seen underspecified plans, which we then ask the model to flesh out further. We’ve also all seen models incompletely execute a plan or declare victory early on a plan before it’s been completed. Additionally in this case, the model has to remember to update the plan when it encounters new information, which isn’t ever a guarantee.
            - paragraph [ref=e306]: All three failure modes have improved as RL for this form of planning has improved (you can just look at how you’ve used these tools over the past year), however, these failure modes require direct RL to counteract them. As the spend for RL post training increases, the rate of failure for these will decrease for any fixed task complexity but are necessarily non-intuitive for the models (tautologically as evidenced by the need to train for the behavior).
            - heading "Direct Task Decomposition" [level=3] [ref=e307]:
              - link [ref=e308] [cursor=pointer]:
                - /url: "#section-8"
                - text: "#"
              - text: Direct Task Decomposition
            - paragraph [ref=e309]:
              - text: Markdown plans go stale though, so the next move is to make execution structure mandatory and update it as we go. Frequently this gets implemented as a task tree where the model must work through each node before continuing. This solves the early-stopping problem and can leverage subagent context isolation for thoroughness. (see ADaPT
              - superscript [ref=e310]:
                - link "[19]" [ref=e311] [cursor=pointer]:
                  - /url: "#ref-19"
              - text: )
            - paragraph [ref=e312]: In this system, the model will take a main task, spawn subtasks, hopefully execute the subtasks, and then return to complete the main task.
            - 'figure "Direct task decomposition: a task tree where each node is either executed directly or split into subtasks. Thorough but rigid — adapting to new information requires rewriting the tree." [ref=e313]':
              - paragraph [ref=e314]: Direct Task Decomposition Tree
              - img "Task decomposition tree diagram" [ref=e315]:
                - generic [ref=e317]: main task
                - generic [ref=e321]: subtask A
                - generic [ref=e323]: subtask B
                - generic [ref=e325]: subtask C
                - generic [ref=e329]: leaf
                - generic [ref=e331]: leaf
                - generic [ref=e332]: execute or split
                - generic [ref=e333]: execute or split
              - generic [ref=e334]: "Direct task decomposition: a task tree where each node is either executed directly or split into subtasks. Thorough but rigid — adapting to new information requires rewriting the tree."
            - paragraph [ref=e335]: For additional thoroughness, you can introduce a gating mechanism for the task that requires it to walk through N different steps in order to tag the task as completed.
            - paragraph [ref=e336]:
              - strong [ref=e337]: "Two main failure modes:"
            - list [ref=e338]:
              - listitem [ref=e339]: The system has a hard time adapting to new information due to linear task dependence
              - listitem [ref=e340]: The system fails to completely decompose a main task leaving subtasks and their results unintegrated
            - paragraph [ref=e341]:
              - text: Verifying this is left as an exercise for the reader (just try it on the
              - code [ref=e342]: gpt2-codegolf
              - text: task
              - superscript [ref=e343]:
                - link "[20]" [ref=e344] [cursor=pointer]:
                  - /url: "#ref-20"
              - text: ), but rigidly walking an agent through a task tree where each task has verification steps and is gated behind a sequence of actions helps to keep an agent on track but does not leave room for the agent to flexibly execute the task.
            - paragraph [ref=e345]: The main premise with using a tree of gated tasks like this is that you avoid the early stopping failure mode models are prone to, but you end up trading the flexibility of natural language and implicit planning for rigidity in the process.
            - paragraph [ref=e346]: Intuitively, the dependence on the structured task data is the main culprit here. It's also the driver of the thoroughness.
            - paragraph [ref=e347]:
              - text: The rigidity makes the system overall less able to express varied behavior and flexibly handle tasks. We can say the system has low
              - emphasis [ref=e348]: expressivity
              - text: .
            - heading "Expressivity and Inductive Bias" [level=3] [ref=e349]:
              - link [ref=e350] [cursor=pointer]:
                - /url: "#section-9"
                - text: "#"
              - text: Expressivity and Inductive Bias
            - paragraph [ref=e351]: An agent harness has high expressivity when it enables many possible end states with relatively few output operations.
            - paragraph [ref=e352]:
              - text: To illustrate the expressivity of different tools, consider for example two harnesses. Harness A one has a
              - code [ref=e353]: file_read
              - text: tool and Harness B can only use the
              - code [ref=e354]: sed
              - text: command. No matter how hard harness A tries, and regardless of the model provided, harness A can never express the action of editing a file. On the other hand, although arguably less token efficient, Harness B is fully capable of reading, writing, searching text, etc. This is a result of the
              - code [ref=e355]: sed
              - text: tool's expressivity. As in, you can express a wider variety of operations through a marginally more complex interface.
            - figure "Expressivity is about reachable behavior space. A more expressive interface unlocks more possible end states from the same model." [ref=e356]:
              - paragraph [ref=e357]: "Harness Expressivity: Reachable Behavior Space"
              - img "Expressivity comparison between file_read-only and sed harnesses" [ref=e358]:
                - generic [ref=e361]: Harness A — file_read only
                - generic [ref=e362]: Harness B — sed
                - generic [ref=e363]: ✓ read files
                - generic [ref=e364]: ✗ write files
                - generic [ref=e365]: ✗ search text
                - generic [ref=e366]: ✗ edit in place
                - generic [ref=e367]: ✓ read files
                - generic [ref=e368]: ✓ write files
                - generic [ref=e369]: ✓ search text
                - generic [ref=e370]: ✓ edit in place
              - generic [ref=e371]: Expressivity is about reachable behavior space. A more expressive interface unlocks more possible end states from the same model.
            - paragraph [ref=e372]: The expressivity of a system is important, but so is the ability of the model to use it. The model's ability to use the provided harness is directly dependent on how in-distribution the interface for using that harness is.
            - paragraph [ref=e373]: "Take, for example, two highly expressive systems: Bash vs. a Python REPL"
            - paragraph [ref=e374]:
              - text: The training data for what these things are used for is somewhat different. A harness with a python REPL
              - emphasis [ref=e375]: will
              - text: be able to do a lot of the same work as a harness with a Bash shell env. However, how quickly the model completes the desired task will be dependent on the prevalence of the required operations in the training data. For example a task where the agent has to solve issues in a package with c bindings on an ubuntu vm and use the patched package might be more challenging from within a python REPL harness than it would be from within a Bash harness.
            - paragraph [ref=e376]:
              - text: There exists a bias in how the model understands how to use these different harnesses despite both of them being
              - emphasis [ref=e377]: theoretically
              - text: equally expressive.
            - paragraph [ref=e378]: The inductive biases of a model, the expressivity of the system, and the sampling method chosen lead to the specific behaviors we observe. As a harness builder, the goal is to make desired behavior the natural behavior.
            - blockquote [ref=e379]:
              - paragraph [ref=e380]: "Note: Inductive bias here means the default behaviors a model has been trained to prefer from raw pretraining to rubric post training"
            - paragraph [ref=e381]:
              - text: As a harness builder, your job is to design a harness where the system naturally expresses the desired behaviors. The ability for the
              - emphasis [ref=e382]: system
              - text: to express the behaviors is dependent on how expressive the harness is and what the model’s inductive biases look like.
            - paragraph [ref=e383]: "Now, back to the problem of task decomposition: strict task graphs that force the model through steps notably constrain the expressivity of the system."
            - heading "RLM and Recursive Decomposition" [level=3] [ref=e384]:
              - link [ref=e385] [cursor=pointer]:
                - /url: "#section-10"
                - text: "#"
              - text: RLM and Recursive Decomposition
            - paragraph [ref=e386]: Agent systems need a more flexible way to both decompose and execute tasks. RLM is the approach that comes closest to balancing these needs. Instead of forcing a fixed decomposition, it gives the model a Python REPL and the ability to run operations recursively, letting task structure emerge naturally from the model's own reasoning rather than being imposed upfront.
            - paragraph [ref=e387]:
              - text: Subcalls (either direct LLM queries or RLM-like subagents) encapsulate context, the REPL allows the model to iteratively adapt to the problem rather than being forced to use it in a fire and forget pattern, the model has massive amounts of data for
              - emphasis [ref=e388]: scripting
              - text: in python so it knows the interface and is biased towards using it, context can be passed by reference which maintains the source of truth, and the model has the ability to
              - emphasis [ref=e389]: naturally
              - text: decompose the task in an unforced way.
            - paragraph [ref=e390]: Essentially, task decomposition falls out of just having the right primitives and an interface the model is biased towards using.
            - paragraph [ref=e391]: Theres one catch.
            - paragraph [ref=e392]:
              - text: Notice how the official implementation has a limited depth?
              - superscript [ref=e393]:
                - link "[2]" [ref=e394] [cursor=pointer]:
                  - /url: "#ref-2"
              - text: It was only discussed with depth=1. When given the ability to
              - emphasis [ref=e395]: actually
              - text: recurse (depth=N) the model needs a guard against over decomposition. Not because a model always will, but it can and especially does when tasked with decomposition. Given an interface that offers unbounded decomposition the harness needs an underlying guard against overdecomposition.
            - paragraph [ref=e396]:
              - text: "However, there's a second question: how does the system adapt to data it discovers mid-execution? The lack of intermediate results from the REPL means the model has to commit to a full plan for that step upfront and only finds out if it worked at the very end. Imagine solving a maze where you have to blindly guess"
              - emphasis [ref=e397]: "n"
              - text: steps into the future. In this world, the only source of feedback you get is where you end up. Theres not much room for course correction especially if the environment is being mutated. You either emerge on the other side or you don't.
            - figure "Without intermediate feedback, the model must commit to a full sequence of steps — like navigating a maze blind. It only discovers it hit a wall when execution ends. With per-step feedback, it detects the wall immediately and reroutes." [ref=e398]:
              - paragraph [ref=e399]: Blind N-Step Execution
              - img "One-shot path commitment vs reactive step-by-step execution" [ref=e400]:
