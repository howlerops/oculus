            - 'heading "Threads as Processes: A OS view into LLM systems" [level=3] [ref=e698]':
              - link [ref=e699] [cursor=pointer]:
                - /url: "#section-17"
                - text: "#"
              - text: "Threads as Processes: A OS view into LLM systems"
            - paragraph [ref=e700]:
              - text: Threads and episodes map directly onto an OS style framing.
              - superscript [ref=e701]:
                - link "[26]" [ref=e702] [cursor=pointer]:
                  - /url: "#ref-26"
            - figure "Karpathy's LLM OS framing — the LLM as OS kernel. Context window = RAM. Tool calls = processes. Files = storage. [26]" [ref=e703]:
              - 'img "Karpathy''s LLM OS diagram: the LLM as an emerging OS kernel managing context (RAM), processes (tool calls/subagents), storage (files), and peripherals (browser, terminal, APIs)." [ref=e704]'
              - generic [ref=e705]:
                - text: Karpathy's LLM OS framing — the LLM as OS kernel. Context window = RAM. Tool calls = processes. Files = storage.
                - superscript [ref=e706]:
                  - link "[26]" [ref=e707] [cursor=pointer]:
                    - /url: "#ref-26"
            - paragraph [ref=e708]: "Specifically, Karpathy's LLM OS describes the LLM as an operating system kernel: managing context (RAM), spawning processes (tool calls, subagents), reading and writing to storage (files, memory), and coordinating I/O across peripherals (browsers, terminals, APIs). Just as an OS kernel doesn't execute application logic itself, the main thread LLM schedules tasks, manages resources, and maintains process state in order to route work through the system."
            - paragraph [ref=e709]: "Slate's thread architecture maps onto this directly. The orchestration layer is the kernel. Threads are isolated processes. Episodes are the process return values: compressed summaries of what the process did, committed back into the kernel's working memory. The filesystem, terminal, and web are the peripherals. The model's context window is RAM — scarce, precious, and actively managed."
            - paragraph [ref=e710]: "Slate's episode architecture is a direct answer in that framing: instead of letting RAM fill until the process crashes, each thread return is a natural opportunity to decide what gets retained, what gets compressed, and what gets discarded."
            - heading "Long horizon task bottlenecks" [level=3] [ref=e711]:
              - link [ref=e712] [cursor=pointer]:
                - /url: "#section-18"
                - text: "#"
              - text: Long horizon task bottlenecks
            - paragraph [ref=e713]: The real bottleneck in long-horizon agentic tasks is context management, not model intelligence. Models are already capable enough to solve many more tasks than they currently succeed at due to the knowledge overhang. The gap is a systems problem, not a capability problem.
            - paragraph [ref=e714]: What's remarkable about Slate is that our routing works at all. The models seem to understand how to route context throughout the system in ways that are useful and appropriate, without being explicitly trained to do so. We leave a formal analysis and benchmarking of this routing behavior as future work.
            - paragraph [ref=e715]:
              - text: And we leave it as an exercise for the reader
              - emphasis [ref=e716]: to experience.
            - paragraph [ref=e717]: "Today we are releasing this agent into open beta. You can use it by visiting our home page or running `npm i -g @randomlabs/slate`"
            - heading "Interesting Observations" [level=3] [ref=e718]:
              - link [ref=e719] [cursor=pointer]:
                - /url: "#section-19"
                - text: "#"
              - text: Interesting Observations
            - paragraph [ref=e720]: "A few results that surprised us during development and testing:"
            - list [ref=e721]:
              - listitem [ref=e722]:
                - strong [ref=e723]: Massively parallel execution in practical workflows.
                - text: Real software tasks decompose naturally into parallel thread workstreams. The orchestrator can dispatch several threads simultaneously and synthesize their episodes before continuing. This is qualitatively different from sequential step-by-step agents and in practice it seems to be faster.
              - listitem [ref=e724]:
                - strong [ref=e725]: Cross-model composition.
                - text: Using Sonnet and Codex together across the same task works well. The episode boundary acts as a clean handoff between models with no loss of context coherence.
            - heading "References" [level=2] [ref=e726]:
              - link [ref=e727] [cursor=pointer]:
                - /url: "#section-20"
                - text: "#"
