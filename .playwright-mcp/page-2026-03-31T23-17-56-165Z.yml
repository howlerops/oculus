              - text: Codex and Claude Code
            - paragraph [ref=e470]: These are incredibly simple. They delegate work to a subagent using something like a prompt, and the subagent responds back when done.
            - paragraph [ref=e471]: This approach explicitly introduces a synchronization problem because the main parent is isolated from the child context and has to rely on some sort of message passing (in this case, it’s sending a prompt and receiving a response). This is why originally the subagents ended up being best used just for search since most search operations are exploratory and actually not necessary to retain most context for.
            - paragraph [ref=e472]: Luckily for the labs, they can just train the models to be good at delegating to subagents and good at being subagents. This is not something to bet against as a harness creator.
            - paragraph [ref=e473]: Claude unnecessarily defines persistent roles for the subagents, but this is because their approach to synchronization is message passing (which we believe to be incorrect at with a mainthread + subagent architecture given current model behavior, however the models will get better at this because they will be trained for it).
            - paragraph [ref=e474]: We think single threaded agents have not been solved fully. As an industry, we do not need to move on to teams just yet.
